name: Build M60K63 ImmortalWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone upstream ImmortalWrt
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git openwrt

          cd openwrt

          git remote add fujr https://github.com/FUjr/immortalwrt.git
          git fetch fujr

          # Copy M60K63 DTS
          git checkout fujr/add_m60k63 -- target/linux/mediatek/dts/mt7986a-alwaylink-m60k63.dts

      - name: Add M60K63 device block
        run: |
          cd openwrt

          cat << 'EOF' >> target/linux/mediatek/image/filogic.mk

          define Device/alwaylink_m60k63
            DEVICE_VENDOR := Alwaylink
            DEVICE_MODEL := M60K63
            DEVICE_DTS := mt7986a-alwaylink-m60k63
            DEVICE_DTS_DIR := ../dts
            DEVICE_PACKAGES := \
              kmod-mt7915e \
              wpad-openssl \
              kmod-usb3 \
              uqmi \
              modemmanager \
              modemmanager-rpcd \
              kmod-usb-net \
              kmod-usb-net-qmi-wwan \
              kmod-usb-net-cdc-mbim \
              kmod-usb-serial \
              kmod-usb-serial-option \
              kmod-usb-wdm \
              kmod-phy-realtek \
              luci \
              luci-ssl-openssl
            IMAGE_SIZE := 65536k
            UBINIZE_OPTS := -E 5
            BLOCKSIZE := 128k
            PAGESIZE := 2048
            KERNEL_IN_UBI := 1
            IMAGES += factory.bin
            IMAGE/sysupgrade.bin := sysupgrade-tar | append-metadata
          endef

          TARGET_DEVICES += alwaylink_m60k63
          EOF

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Create config
        run: |
          cd openwrt

          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_alwaylink_m60k63=y

          CONFIG_TARGET_ROOTFS_INITRAMFS=y

          CONFIG_DEVEL=y
          CONFIG_CCACHE=y

          # USB / MODEM / 5G
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
          CONFIG_PACKAGE_kmod-usb-net-cdc-mbim=y
          CONFIG_PACKAGE_kmod-usb-serial=y
          CONFIG_PACKAGE_kmod-usb-serial-option=y
          CONFIG_PACKAGE_kmod-usb-wdm=y
          CONFIG_PACKAGE_uqmi=y
          CONFIG_PACKAGE_modemmanager=y
          CONFIG_PACKAGE_modemmanager-rpcd=y
          CONFIG_PACKAGE_libqmi=y
          CONFIG_PACKAGE_libmbim=y
          CONFIG_PACKAGE_wwan=y

          # PHY
          CONFIG_PACKAGE_kmod-phy-realtek=y

          # LuCI
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl-openssl=y

          EOF

          make defconfig

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            openwrt/.ccache
            openwrt/staging_dir
            openwrt/build_dir
            openwrt/dl
          key: ${{ runner.os }}-m60k63-${{ hashFiles('openwrt/.config') }}

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: m60k63-firmware
          path: |
            openwrt/bin/targets/mediatek/filogic/*
