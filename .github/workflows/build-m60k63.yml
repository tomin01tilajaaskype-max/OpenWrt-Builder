name: Build M60K63 ImmortalWrt
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils rsync unzip zlib1g-dev file wget
      - name: Clone ImmortalWrt M60K63 source
        run: |
          git clone https://github.com/FUjr/immortalwrt.git openwrt
          cd openwrt
          git checkout add_m60k63
      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Create config
        run: |
          cd openwrt
          cat > .config << 'EOF'
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_alwaylink_m60k63=y
          CONFIG_TARGET_ROOTFS_INITRAMFS=y
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y
          EOF
          make defconfig
      - name: Download packages
        run: |
          cd openwrt
          make download -j8
      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: m60k63-firmware
          path: |
            openwrt/bin/targets/mediatek/filogic/*
