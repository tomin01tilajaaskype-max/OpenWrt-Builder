name: Build Z8803BE

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      DEVICE: z8803be-emmc
      PROFILE: release
      WORKDIR: immortalwrt

    steps:
      - name: Checkout OpenRouterLab
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          ```yaml
      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses-dev \
            libssl-dev \
            python3 \
            python3-pip \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            curl \
            device-tree-compiler \
            ccache \
            patch \
            diffutils
            
      - name: Prepare build
        run: |
          chmod +x scripts/prepare.sh
          ./scripts/prepare.sh "$DEVICE" "$PROFILE"

      - name: Apply overlay
        run: |
          if [ -d "devices/$DEVICE/overlay" ]; then
            rsync -a "devices/$DEVICE/overlay/" "$WORKDIR/"
          else
            echo "No overlay directory for $DEVICE, skipping."
          fi

      - name: Configure
        run: |
          cd "$WORKDIR"
          make defconfig

      - name: Download sources
        run: |
          cd "$WORKDIR"
          make download -j$(nproc)

      - name: Compile
        run: |
          cd "$WORKDIR"
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware-z8803be-emmc
          path: |
            immortalwrt/bin/targets/**
